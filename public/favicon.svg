<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#6366f1"/>
  <!-- Pencil body -->
  <g transform="translate(50,50) rotate(-45) translate(-50,-50)">
    <rect x="38" y="20" width="24" height="50" rx="2" fill="white"/>
    <!-- Pencil tip -->
    <polygon points="38,70 62,70 50,88" fill="white"/>
    <!-- Pencil top -->
    <rect x="38" y="16" width="24" height="8" rx="2" fill="#c7d2fe"/>
    <!-- Stripe -->
    <rect x="38" y="40" width="24" height="4" fill="#c7d2fe"/>
  </g>
</svg>
